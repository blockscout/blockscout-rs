  /api/v1/stats/chain/{chain_id}/bridged-tokens:
    get:
      operationId: InterchainStatisticsService_GetBridgedTokens
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1GetBridgedTokensResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: chain_id
          description: The home (focal) chain.
          in: path
          required: true
          type: string
          format: int64
        - name: page_size
          in: query
          required: false
          type: integer
          format: int64
        - name: last_page
          in: query
          required: false
          type: boolean
        - name: sort
          description: 'Sort field: TOTAL_TRANSFERS_COUNT[default] / OUTPUT_TRANSFERS_COUNT / INPUT_TRANSFERS_COUNT / NAME'
          in: query
          required: false
          type: string
          enum:
            - TOTAL_TRANSFERS_COUNT
            - OUTPUT_TRANSFERS_COUNT
            - INPUT_TRANSFERS_COUNT
            - NAME
          default: TOTAL_TRANSFERS_COUNT
        - name: order
          description: 'Sort order: DESC[default] / ASC'
          in: query
          required: false
          type: string
          enum:
            - DESC
            - ASC
          default: DESC
        - name: page_token
          description: Token-based pagination
          in: query
          required: false
          type: string
        - name: direction
          description: Flat keys matching `BridgedTokensListPagination` / `next_page_params` / `prev_page_params` (for `api.use_pagination_token=false`, pass that dict fields here).
          in: query
          required: false
          type: string
        - name: asset_id
          in: query
          required: false
          type: string
          format: int64
        - name: name
          in: query
          required: false
          type: string
        - name: name_blank
          in: query
          required: false
          type: boolean
        - name: count
          in: query
          required: false
          type: string
          format: uint64
        - name: q
          description: Case-insensitive substring filter on the row display name (`stats_assets.name`).
          in: query
          required: false
          type: string
        - name: counterparty_chain_ids
          description: |-
            Comma-separated chain ids. Restricts counterparty chains of the edges
            aggregated for `{chain_id}`.
          in: query
          required: false
          type: string
        - name: bridge_ids
          description: |-
            Comma-separated bridge ids (see GET /api/v1/interchain/bridges). Restricts
            the aggregated edges to the selected bridges; bridge rows are summed per
            asset before pagination. Absent or blank means all bridges. Composes with
            `counterparty_chain_ids` through AND. Malformed/out-of-range values are
            rejected with InvalidArgument. Page tokens are scoped to the same bridge
            and counterparty filters that produced them.
          in: query
          required: false
          type: string
      tags:
        - InterchainStatisticsService
