          schema:
            $ref: '#/definitions/v1GetMessagesResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: q
          description: multisearch ability
          in: query
          required: false
          type: string
        - name: page_size
          description: 'Items on a page: bounded by the API settings'
          in: query
          required: false
          type: integer
          format: int64
        - name: last_page
          description: If true, return only the last page (pagination token is ignored)
          in: query
          required: false
          type: boolean
        - name: page_token
          description: |-
            input pagination token - used by default
            (packed version of the raw pagination parameters)
          in: query
          required: false
          type: string
        - name: timestamp
          description: |-
            Raw pagination parameters
            (used when api.use_pagination_token=false)

            Raw pagination field
          in: query
          required: false
          type: string
          format: uint64
        - name: message_id
          description: Raw pagination field
          in: query
          required: false
          type: string
        - name: bridge_id
          description: Raw pagination field
          in: query
          required: false
          type: integer
          format: int64
        - name: direction
          description: Raw pagination field
          in: query
          required: false
          type: string
        - name: home_chain_id
          description: 'Filter: only messages touching this chain (src = N OR dst = N).'
          in: query
          required: false
          type: string
          format: int64
        - name: counterparty_chain_ids
          description: |-
            Comma-separated chain ids. With home_chain_id: restricts the other
            endpoint (peer) to this set. Without home_chain_id: both endpoints
            must be within the set. Messages with unknown (NULL) destination are
            excluded whenever this set is present.
          in: query
          required: false
          type: string
        - name: bridge_ids
          description: Comma-separated bridge ids (see GET /api/v1/interchain/bridges).
          in: query
          required: false
          type: string
        - name: src_chain_ids
          description: |-
            Comma-separated source chain ids. Independent directional filter that
            narrows the focal predicate through AND (matches messages whose
            src_chain_id is in this set). src_chain_ids and dst_chain_ids are
            independent direction sets; both apply when both are present.
          in: query
          required: false
          type: string
        - name: dst_chain_ids
          description: |-
            Comma-separated destination chain ids. Independent directional filter that
            narrows the focal predicate through AND (matches messages whose
            dst_chain_id is in this set). A destination filter excludes messages with a
            NULL destination through normal SQL semantics.
          in: query
          required: false
          type: string
      tags:
        - InterchainService
