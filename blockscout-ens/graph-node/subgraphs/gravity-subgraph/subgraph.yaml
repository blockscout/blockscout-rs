specVersion: 0.0.4
description: Subgraph to index Gravity Name Service Subgraph
repository: https://github.com/blockscout/blokcscout-rs
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: ENSRegistry
    network: gravity
    source:
      abi: ENSRegistry
      address: "0x5dc881dda4e4a8d312be3544ad13118d1a04cb17"
      startBlock: 32227752
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: ./src/ENSRegistry.ts
      entities:
        - Domain
        - Account
        - Resolver
      abis:
        - name: ENSRegistry
          file: ./abis/ENSRegistry.json
      eventHandlers:
        - event: Transfer(indexed bytes32,address)
          handler: handleTransfer
        - event: NewOwner(indexed bytes32,indexed bytes32,address)
          handler: handleNewOwner
        - event: NewResolver(indexed bytes32,address)
          handler: handleNewResolver
        - event: NewTTL(indexed bytes32,uint64)
          handler: handleNewTTL


  - kind: ethereum/contract
    name: PublicResolver
    network: gravity
    source:
      abi: PublicResolver
      startBlock: 29420800
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: ./src/PublicResolver.ts
      entities:
        - AddrChanged
        - MulticoinAddrChanged
        - NameChanged
        - AbiChanged
        - PubkeyChanged
        - Textchanged
        - ContenthashChanged
        - InterfaceChanged
      abis:
        - name: PublicResolver
          file: ./abis/PublicResolver.json
      eventHandlers:
        - event: ABIChanged(indexed bytes32,indexed uint256)
          handler: handleABIChanged
        - event: AddrChanged(indexed bytes32,address)
          handler: handleAddrChanged
        - event: AddressChanged(indexed bytes32,uint256,bytes)
          handler: handleMulticoinAddrChanged
        - event: ContenthashChanged(indexed bytes32,bytes)
          handler: handleContentHashChanged
        - event: InterfaceChanged(indexed bytes32,indexed bytes4,address)
          handler: handleInterfaceChanged
        - event: NameChanged(indexed bytes32,string)
          handler: handleNameChanged
        - event: PubkeyChanged(indexed bytes32,bytes32,bytes32)
          handler: handlePubkeyChanged
        - event: TextChanged(indexed bytes32,indexed string,string,string)
          handler: handleTextChanged
        - event: VersionChanged(indexed bytes32,uint64)
          handler: handleVersionChanged
  - kind: ethereum/contract
    name: BaseRegistrarImplementation
    network: gravity
    source:
      abi: BaseRegistrarImplementation
      address: "0xf8d9d86a4594ffc975ca9c760c5887bd9a3b6232"
      startBlock: 29420800
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: ./src/BaseRegistrarImplementation.ts
      entities:
        - Registration
        - NameRegistered
        - NameRenewed
        - NameTransferred
      abis:
        - name: BaseRegistrarImplementation
          file: ./abis/BaseRegistrarImplementation.json
      eventHandlers:
        - event: NameRegistered(indexed uint256,indexed address,uint256)
          handler: handleNameRegistered
        - event: NameRenewed(indexed uint256,uint256)
          handler: handleNameRenewed
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleNameTransferred

  - kind: ethereum/contract
    name: BASERegistrarController
    network: gravity
    source:
      abi: BASERegistrarController
      address: "0xd7b837a0e388b4c25200983bdaa3ef3a83ca86b7"
      startBlock: 29420800
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: ./src/BASERegistrarController.ts
      entities:
        - Registration
      abis:
        - name: BASERegistrarController
          file: ./abis/BASERegistrarController.json
      eventHandlers:
        - event: NameRegistered(string,indexed bytes32,indexed address,uint256,uint256,uint256)
          handler: handleNameRegisteredByController
        - event: NameRenewed(string,indexed bytes32,uint256,uint256)
          handler: handleNameRenewedByController
